name: LaTeX to PDF and Deploy

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex

      - name: Create Page
        run: |
          echo "<!DOCTYPE html>
          <html>
          <head>
            <title>CV</title>
            <meta http-equiv='refresh' content='0; url=cv.pdf'>
          </head>
          <body>
            <p>Redirecting to <a href='cv.pdf'>CV.pdf</a>...</p>
          </body>
          </html>" > index.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./
          force_orphan: true
