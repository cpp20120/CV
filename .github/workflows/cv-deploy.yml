name: LateX to PDF

on:
  push:
    branches:
      - master
      - main
    tags:
      - '*'
  pull_request:
    branches: [ master ]

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
      - name: Upload PDF to the workflow tab
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: cv.pdf
